apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: c1pay
  labels:
    app.kubernetes.io/name: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate   # must for RWX PVC with a single writer
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: tcp
          env:
            - name: POSTGRES_DB
              value: c1pay
            - name: POSTGRES_USER
              value: c1pay
            - name: POSTGRES_PASSWORD
              value: c1pay
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "c1pay"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "c1pay"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
