apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: c1pay
  namespace: argocd                    # ── namespace where ArgoCD is installed
spec:
  project: default

  source:
    repoURL:    https://github.com/<org>/<repo>.git   # ── replace with your repo
    targetRevision: main                            # ── branch / tag / SHA to track
    path: argocd/base                                  # ── directory containing k8s manifests

  destination:
    server:    https://kubernetes.default.svc            # ── in-cluster API server
    namespace: c1pay                                   # ── target k8s namespace (created by namespace.yaml)

  syncPolicy:
    automated:
      prune: true                        # delete resources not in the repo
      selfHeal: true                     # auto-reconcile on manual drift
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
