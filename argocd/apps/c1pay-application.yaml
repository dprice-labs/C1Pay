apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: c1pay
  namespace: argocd
spec:
  project: default

  source:
    repoURL:    https://github.com/dprice-labs/C1Pay.git
    targetRevision: dsilva                              # branch tracking the dsilva deployment
    path: argocd/base                                 # directory containing k8s manifests (ArgoCD recurses:)

  destination:
    server:    https://kubernetes.default.svc         # in-cluster API server
    namespace: c1pay                                  # target k8s namespace

  syncPolicy:
    automated:
      prune: true                                     # delete resources not in the repo
      selfHeal: true                                  # auto-reconcile on manual drift
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
