apiVersion: v1
kind: Secret
metadata:
  name: c1pay-secrets
  namespace: c1pay
type: Opaque
stringData:
  NODE_ENV: production
# NOTE: Populate these via ArgoCD params or a secrets manager (e.g. AWS SM, Vault) before first deploy.
#   DATABASE_URL — RDS instance connection string (not the in-cluster postgres below)
#   JWT_SECRET   — long random hex string (≥ 32 bytes). Run: node -e "console.log(crypto.randomBytes(32).toString('hex'))"
