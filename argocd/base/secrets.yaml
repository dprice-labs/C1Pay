apiVersion: v1
kind: Secret
metadata:
  name: c1pay-secrets
  namespace: c1pay
type: Opaque
stringData:
  NODE_ENV: production
  DATABASE_URL: postgresql://c1pay:c1pay@postgres:5432/c1pay
  JWT_SECRET: CHANGEME-generate-with-node -e "crypto.randomBytes(32).toString('hex')"
# NOTE: In production, replace DATABASE_URL with your RDS endpoint and use AWS SM or Vault for secret management.
