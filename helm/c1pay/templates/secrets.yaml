{{- if or .Values.secrets.jwtSecret .Values.secrets.databaseUrl }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "c1pay.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
type: Opaque
data:
  {{- if .Values.secrets.jwtSecret }}
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.databaseUrl }}
  database-url: {{ .Values.secrets.databaseUrl | b64enc | quote }}
  {{- end }}
{{- end }}
