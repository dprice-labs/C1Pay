# ──────────────────────────────────────────────────────────────
# c1pay — canary deployment (5% traffic → monitor → promote)
# ──────────────────────────────────────────────────────────────

# Canary runs alongside production at 5% traffic:
#   helm upgrade --install c1pay-canary helm/c1pay \
#     --namespace=c1pay --create-namespace \
#     -f helm/c1pay/values.yaml \
#     -f helm/c1pay/values-canary.yaml

replicaCount: 1                               # small initial footprint

image:
  repository: c1pay-ecr-account.dkr.ecr.us-east-1.amazonaws.com/c1pay
  tag: "canary-latest"                        # deploy latest candidate
  pullPolicy: Always

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false                               # manual scaling during canary period

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/ssl-redirect: "443"
  hosts:
    - host: c1pay.yourdomain.com              # same domain as production
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: c1pay-tls
      hosts:
        - c1pay.yourdomain.com

# Canary uses weighted backend routing via ALB annotations:
# The actual traffic split is configured on the ALB controller with
# alb.ingress.kubernetes.io/actions.weighted-routing for path-based rules,
# or by using external DNS + ALB weight rules after canary passes.
serviceAccount:
  name: c1pay-canary

secrets:
  jwtSecret: ""        # inject via --set secrets.jwtSecret=...
  databaseUrl: ""      # inject via --set secrets.databaseUrl=...
