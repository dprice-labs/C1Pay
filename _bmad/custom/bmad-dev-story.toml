# Team override for bmad-dev-story.
# Branch hygiene: offer a feature branch before any code is written.
[workflow]
activation_steps_append = [
  "Before making any code changes, check the current git branch (`git branch --show-current`). If HEAD is on the default branch (`main` or `master`), offer to create a dedicated feature branch for this story — suggest a name derived from the story key, e.g. `story/<story-key>` — and create it once the user confirms. If the user declines, note that work will proceed on the current branch. If already on a non-default branch, continue without prompting.",
  "Record the session start time: note the current datetime (from {date}) as `dev_session_start`. Then open the story file and append the following section if it does not already exist — add it after the Change Log section (or at the end of the file if Change Log is absent): '## Session Metrics\\n\\n### Development\\n- Started: {date}\\n- Completed: —\\n- Duration: —\\n- Tokens (dev): —\\n\\n### Code Review\\n- Completed: —\\n- Duration: —\\n- Tokens: —'. Save the file.",
]

on_complete = "Update the Session Metrics section of the story file: set 'Completed' under Development to the current datetime ({date}), and set 'Duration' to the elapsed time since `dev_session_start` (calculate as best you can from the start time you recorded at activation). Then write the file `{project-root}/.claude/story-session.json` with this exact JSON content (replacing STORY_FILE_PATH with the absolute path to the story file): {\"story_file\": \"STORY_FILE_PATH\", \"phase\": \"dev\"}. This intent file is read by the Stop hook to automatically capture token usage — no user action needed."
