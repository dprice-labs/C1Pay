# Team override for bmad-quick-dev.
# Branch hygiene: offer a feature branch before any code is written.
[workflow]
activation_steps_append = [
  "Before making any code changes, check the current git branch (`git branch --show-current`). If HEAD is on the default branch (`main` or `master`), offer to create a dedicated feature branch for this work — suggest a descriptive name, e.g. `feat/<short-slug>` — and create it once the user confirms. If the user declines, note that work will proceed on the current branch. If already on a non-default branch, continue without prompting.",
]
