name: Deploy to Kubernetes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
  IMAGE_NAME: c1pay
  CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  AWS_REGION: us-east-1

jobs:
  # ── PR checks (lint + test + build) ────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration:docker

      - name: E2E tests
        run: npm run test:e2e:docker

      - name: Build check
        run: npm run build

  # ── Production deploy on main push ──────────────────────────────
  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)
          docker build -t ${ECR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG} -f argocd/Dockerfile .
          docker push ${ECR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}

      - name: Update image in K8s manifests
        run: |
          IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          sed -i "s|image: c1pay:latest|image: ${ECR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}|g" argocd/base/app-deployment.yaml

      - name: Deploy via ArgoCD (sync)
        uses: syn.tools/action-argocd-server@v1.0
        with:
          app-name: c1pay
          namespace: c1pay

      - name: Verify deployment
        run: |
          echo "Waiting for rollout to complete..."
          kubectl rollout status deployment/c1pay -n c1pay --timeout=300s
          echo "Deployment verified"
