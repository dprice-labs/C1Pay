# Local development database for C1Pay.
#
# A pinned PostgreSQL 18 instance matching the connection string in .env.local
# (user `postgres`, password `postgres`, database `c1pay`, on :5432). Data
# persists in the `c1pay-pgdata` volume across restarts.
#
# Usage:
#   docker compose up -d      # start c1pay-postgres
#   npm run db:migrate        # apply the schema
#   docker compose down       # stop it (data is preserved)
#   docker compose down -v    # stop and wipe all data
#
# The end-to-end test database is a separate, throwaway stack — see
# docker-compose.e2e.yml.

name: c1pay

services:
  db:
    image: postgres:18-alpine
    container_name: c1pay-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: c1pay
    ports:
      - '5432:5432'
    volumes:
      # Postgres 18+ images store data in a version-specific subdir, so the mount
      # goes at /var/lib/postgresql (not /var/lib/postgresql/data as in <=17).
      - c1pay-pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d c1pay']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  c1pay-pgdata:
